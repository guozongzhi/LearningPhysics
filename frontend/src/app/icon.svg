<svg width="64" height="64" viewBox="12 12 40 40" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="orbit" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#22d3ee" />
    </linearGradient>
  </defs>
  <circle cx="32" cy="32" r="22" fill="url(#glow)" />
  <!-- Electron orbits -->
  <ellipse cx="32" cy="32" rx="18" ry="10" fill="none" stroke="url(#orbit)" stroke-width="1.4" />
  <ellipse cx="32" cy="32" rx="18" ry="10" fill="none" stroke="url(#orbit)" stroke-width="1.2" transform="rotate(60 32 32)" />
  <ellipse cx="32" cy="32" rx="18" ry="10" fill="none" stroke="url(#orbit)" stroke-width="1.2" transform="rotate(-60 32 32)" />
  <!-- Nucleus -->
  <circle cx="32" cy="32" r="5" fill="#e5f3ff" />
  <circle cx="29" cy="30" r="2" fill="#38bdf8" />
  <!-- Electrons -->
  <circle cx="32" cy="14" r="3" fill="#22d3ee" />
  <circle cx="19" cy="37" r="2.6" fill="#38bdf8" />
  <circle cx="45" cy="38" r="2.6" fill="#22d3ee" />
</svg>

